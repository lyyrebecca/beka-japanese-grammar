<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 360" role="img" aria-labelledby="title desc">
  <title id="title">日语表达关系图</title>
  <desc id="desc">以意思为中心连接不同等级的日语表达。</desc>
  <rect width="680" height="360" rx="24" fill="#f7f0fa"/>
  <g fill="none" stroke="#cdbed8" stroke-width="2">
    <path d="M340 180 C260 100 160 96 92 132"/>
    <path d="M340 180 C252 190 156 224 96 280"/>
    <path d="M340 180 C410 98 520 88 592 128"/>
    <path d="M340 180 C424 206 520 228 596 286"/>
    <path d="M340 180 C340 120 340 88 340 54"/>
    <path d="M340 180 C340 236 340 274 340 314"/>
  </g>
  <circle cx="340" cy="180" r="58" fill="#7d6791"/>
