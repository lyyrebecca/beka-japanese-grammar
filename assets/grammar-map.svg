  <text x="340" y="200" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" fill="#f3eaf6">意味機能</text>
  <g font-family="system-ui, sans-serif" font-weight="700" font-size="20">
    <rect x="44" y="94" width="120" height="64" rx="18" fill="#fffafd" stroke="#ded2e5"/>
